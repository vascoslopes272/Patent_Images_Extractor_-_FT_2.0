# ── Subset Selection ──
# mode options: "all" | "n_first" | "filter"
subset:
  mode: "all"           # change this to switch what gets processed
  n_first: 5               # used when mode = "n_first"
  filters:                  # used when mode = "filter"
    record_type: null        # e.g. "Patent" | null = no filter
    legal_status: "ALIVE"    # "ALIVE" | "DEAD" | null
    tech_sub_domain: null    # e.g. "TRANSPORT" | null

# ── Download Settings ──
downloader:
  timeout_seconds: 120
  retry_attempts: 3
  delay_between_requests: 1.0   # seconds, be polite to patseer API

# ── YOLO / DocLayout Settings ──
extractor:
  model_path: "models/doclayout_yolo_docstructbench_imgsz1024.pt"  # relative to pipeline/
  device: "cuda:1"               # "cuda:0" | "cuda:1" | "cpu"
  confidence_threshold: 0.3
  target_classes:                # DocLayout-YOLO class names to keep
    - "figure"
    - "table"                    # remove if you only want figures
  pdf_dpi: 150                   # DPI to render PDF pages (150 = good quality + fast)
  batch_size: 1                  # pages processed at once; increase if GPU memory allows
  save_format: "PNG"            # "JPEG" (smaller, universal) or "PNG" (lossless)

# ── Image Processing (Phase 2) ──
processor:
  target_size: 224              # DINOv2 input size
  padding_color: [255, 255, 255] # white padding
  min_crop_pixels: 50           # discard crops smaller than this (px width or height)
  save_format: "PNG"            # must match extractor.save_format

# ── Image Naming Convention ──
# final name: {record_number}_p{page:03d}_c{crop:02d}.png
# example:    US2022267016A1_p003_c01.png
