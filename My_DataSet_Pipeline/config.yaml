# ─────────────────────────────────────────
#  Patent Pipeline — Central Configuration
# ─────────────────────────────────────────

# ── Paths (all local, not committed to git) ──
paths:
  # Master PatSeer export — has real PDF Link hyperlinks (used by 01_extraction).
  excel: "/mnt/storage_11tb/Drive_files_to_syncronize/2 - Patente & Validation/3 -Raw_Patent_Exports_PatSeer_&Gold_Standard/1639__dataset_08_06_26.xlsx"
  # Curated 100-patent / 4-architecture set — has "Architecture Category" but the
  # "PDF Link" column is a placeholder with no real hyperlinks. 00_patent_filter.ipynb
  # merges this with `excel` above (by Record Number) to get category + real pdf_url.
  architecture_excel: "/mnt/storage_11tb/Drive_files_to_syncronize/2 - Patente & Validation/3 -Raw_Patent_Exports_PatSeer_&Gold_Standard/Custom_eVTOL_Dataset_128.xlsx"
  crops: "/mnt/storage_11tb/Drive_files_to_syncronize/3 - Images DataSets & Labelling Outputs/1639_DS/preliminary analysis v2/data/1639_Patents_Raw_Crops"                         # YOLO output
  processed: "/mnt/storage_11tb/Drive_files_to_syncronize/3 - Images DataSets & Labelling Outputs/1639_DS/preliminary analysis v2/data/1639_Patents_Processed"                 # resized + padded
  reviewed:  "/mnt/storage_11tb/Drive_files_to_syncronize/3 - Images DataSets & Labelling Outputs/1639_DS/preliminary analysis v2/data/1639_Patents_reviewed"                  # human-approved
  logs:       "/mnt/storage_11tb/Drive_files_to_syncronize/3 - Images DataSets & Labelling Outputs/1639_DS/preliminary analysis v2/data/1639_Patents_logs"
  experiment: "/mnt/storage_11tb/Drive_files_to_syncronize/3 - Images DataSets & Labelling Outputs/1639_DS/preliminary analysis v2"
  final:      "/mnt/storage_11tb/Drive_files_to_syncronize/3 - Images DataSets & Labelling Outputs/1639_DS/preliminary analysis v2/data/images"  # final output for training
  # review_meta.json and review_export.xlsx are written to paths.experiment (not paths.logs)
  # crop_index.json and extraction_status.xlsx stay in paths.logs (shared, all patents in this run)

# ── Subset Selection ──
# mode options: "all" | "n_first" | "filter" | "selected"
#   "selected" → reads logs/selected_patents.json (written by 00_patent_filter.ipynb)
subset:
  mode: "selected"   # v2: 00_patent_filter.ipynb writes the 98 matched curated patents here
  n_first: 10              # used when mode = "n_first"
  filters:                  # used when mode = "filter" (not used in v2 — kept for reference)
    record_type: null        # e.g. "Patent" | null = no filter
    legal_status: null       # "ALIVE" | "DEAD" | null
    tech_sub_domain: null    # e.g. "TRANSPORT" | null
    cpc_first: []




# ── Download Settings ──
downloader:
  timeout_seconds: 120
  retry_attempts: 3
  delay_between_requests: 1.0   # seconds, be polite to patseer API

# ── YOLO / DocLayout Settings ──
extractor:
  model_path: "models/doclayout_yolo_docstructbench_imgsz1024.pt"  # relative to pipeline/
  device: "cuda:1"               # "cuda:0" | "cuda:1" | "cpu"
  confidence_threshold: 0.3
  target_classes:                # DocLayout-YOLO class names to keep
    - "figure"
    - "table"                    # remove if you only want figures
  pdf_dpi: 150                   # DPI to render PDF pages (150 = good quality + fast)
  batch_size: 1                  # pages processed at once; increase if GPU memory allows
  save_format: "PNG"            # "JPEG" (smaller, universal) or "PNG" (lossless)

# ── Image Processing (Phase 3) ──
processor:
  target_size: 224              # DINOv2 input size
  padding_color: [255, 255, 255] # white padding
  min_crop_pixels: 50           # discard crops smaller than this (px width or height)
  save_format: "PNG"            # must match extractor.save_format
  padding_mode: "legacy"        # "legacy" → white padding | "adaptive" → background-aware
  main_image_only: true        # true → only the image marked "Set as Main" per patent
  force_reprocess: false        # true → delete processed/ cache and rerun from scratch

# ── Review UI (Phase 2) ──
reviewer:
  thumbnail_max_px: 400       # longest side for in-notebook preview thumbnails

# ── Sub-crop Splitting (Phase 2.5) ──
subcropper:
  min_seam_depth_px: 30       # how far below mean intensity a valley must be
  min_seam_span: 0.85         # seam must span >= 85% of perpendicular dimension

# ── Image Naming Convention ──
# final name: {record_number}_p{page:03d}_c{crop:02d}.png
# example:    US2022267016A1_p003_c01.png
